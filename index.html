<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix Video</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <script src="https://unpkg.com/feather-icons"></script>
    
    <style>
        :root {
            --bg-main: #FFFFFF;
            --bg-surface: #F9FAFB;
            --bg-hover: #F3F4F6;
            --text-primary: #000000;
            --text-secondary: #6B7280;
            --accent: #000000; /* Changed from red to black */
            --border: #E5E7EB;
            --sidebar-width: 240px;
            --header-height: 60px;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background: var(--bg-main); color: var(--text-primary); overflow: hidden; }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: var(--bg-surface); padding: 20px; z-index: 1000; position: absolute; inset: 0;
        }
        .auth-card {
            background: var(--bg-main); padding: 32px; border-radius: var(--radius); width: 100%; max-width: 400px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid var(--border);
        }
        .auth-card h2 { margin-bottom: 24px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 12px;}
        .auth-toggle { text-align: center; color: var(--text-secondary); font-size: 14px; cursor: pointer; }

        /* --- MAIN APP LAYOUT --- */
        #app-screen {
            display: none; /* Hidden until authenticated */
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr;
            height: 100vh;
        }

        /* HEADER */
        header { grid-column: 1 / 3; grid-row: 1 / 2; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--bg-main); }
        .brand { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .search-bar { display: flex; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 99px; padding: 8px 16px; width: 400px; }
        .search-bar input { flex: 1; border: none; background: transparent; outline: none; }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 1px solid var(--border); }

        /* SIDEBAR (Desktop) */
        aside { grid-column: 1 / 2; grid-row: 2 / 3; border-right: 1px solid var(--border); padding: 16px 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 10px 16px; border-radius: 8px; color: var(--text-primary); text-decoration: none; font-size: 14px; font-weight: 500; cursor: pointer;}
        .nav-item:hover, .nav-item.active { background: var(--bg-hover); font-weight: 600; }

        /* BOTTOM NAV (Mobile) */
        .bottom-nav { display: none; position: fixed; bottom: 0; width: 100%; background: var(--bg-main); border-top: 1px solid var(--border); padding: 12px 0; z-index: 50; }
        .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: var(--text-secondary); cursor: pointer; }

        /* MAIN FEED */
        main { grid-column: 2 / 3; grid-row: 2 / 3; overflow-y: auto; padding: 24px; background: var(--bg-surface); }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .video-card { display: flex; flex-direction: column; gap: 12px; cursor: pointer; }
        .video-thumb { width: 100%; aspect-ratio: 16/9; background: var(--bg-hover); border-radius: 12px; object-fit: cover; }
        .video-info-row { display: flex; gap: 12px; }
        .video-text h3 { font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .video-text p { font-size: 13px; color: var(--text-secondary); }

        /* UPLOAD MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
        .modal-card { background: var(--bg-main); padding: 24px; border-radius: var(--radius); width: 90%; max-width: 500px; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            #app-screen { grid-template-columns: 1fr; grid-template-rows: var(--header-height) 1fr; }
            aside { display: none; }
            main { grid-column: 1 / 2; padding: 16px; padding-bottom: 80px; }
            .search-bar { display: none; }
            .bottom-nav { display: flex; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Sign In to Vynix</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email address">
            <input type="password" id="auth-password" class="auth-input" placeholder="Password">
            <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">Sign In</button>
            <div class="auth-toggle" onclick="toggleAuthMode()">Need an account? Sign Up</div>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <div class="brand">
                <i data-feather="play" style="fill: var(--accent); color: var(--accent);"></i> Vynix
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search...">
                <i data-feather="search" style="color: var(--text-secondary);"></i>
            </div>
            <div class="header-actions">
                <i data-feather="plus-square" style="cursor: pointer;" onclick="openUploadModal()"></i>
                <img src="https://i.pravatar.cc/100" id="header-avatar" class="avatar" onclick="logout()">
            </div>
        </header>

        <aside>
            <div class="nav-item active"><i data-feather="home"></i> Home</div>
            <div class="nav-item"><i data-feather="compass"></i> Explore</div>
            <div class="nav-item"><i data-feather="folder"></i> Library</div>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 8px 0;">
            <div class="nav-item" onclick="logout()"><i data-feather="log-out"></i> Logout</div>
        </aside>

        <main>
            <h2 style="margin-bottom: 20px; font-size: 18px;">Recommended for you</h2>
            <div class="video-grid" id="feed-container">
                </div>
        </main>

        <nav class="bottom-nav">
            <div class="bottom-nav-item"><i data-feather="home"></i>Home</div>
            <div class="bottom-nav-item" onclick="openUploadModal()"><i data-feather="plus-circle"></i>Upload</div>
            <div class="bottom-nav-item" onclick="logout()"><i data-feather="user"></i>Profile</div>
        </nav>
    </div>

    <div class="modal-overlay" id="upload-modal" onclick="if(event.target === this) closeUploadModal()">
        <div class="modal-card">
            <h3 style="margin-bottom: 16px;">Upload Video</h3>
            <input type="file" id="media-input" accept="video/*" class="auth-input">
            <input type="text" id="post-title" placeholder="Video Title" class="auth-input">
            <button class="auth-btn" id="upload-btn" onclick="createPost()">Publish</button>
            <button class="auth-btn" style="background: var(--bg-hover); color: var(--text-primary);" onclick="closeUploadModal()">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
            authDomain: "fire-b-a8878.firebaseapp.com",
            databaseURL: "https://fire-b-a8878.firebaseio.com",
            projectId: "fire-b-a8878",
            storageBucket: "fire-b-a8878.appspot.com",
            messagingSenderId: "658673187627",
            appId: "1:658673187627:web:6e4c29af661785f0afa36e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const CLOUDINARY_CLOUD_NAME   = 'dqkujefxj';
        const CLOUDINARY_UPLOAD_PRESET = 'banter_box';

        let currentUser = null;
        let isSignup = false;

        // UI Toggles
        window.toggleAuthMode = () => {
            isSignup = !isSignup;
            document.getElementById('auth-title').innerText = isSignup ? "Create Account" : "Sign In to Vynix";
            document.getElementById('auth-submit-btn').innerText = isSignup ? "Sign Up" : "Sign In";
            document.querySelector('.auth-toggle').innerText = isSignup ? "Already have an account? Sign In" : "Need an account? Sign Up";
        };

        window.openUploadModal = () => document.getElementById('upload-modal').style.display = 'flex';
        window.closeUploadModal = () => {
            document.getElementById('upload-modal').style.display = 'none';
            document.getElementById('media-input').value = '';
            document.getElementById('post-title').value = '';
        };

        // Authentication
        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Fill all fields");

            try {
                if(isSignup) {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    // Create user profile in DB
                    await set(ref(db, `users/${cred.user.uid}`), {
                        username: email.split('@')[0],
                        photoURL: "https://i.pravatar.cc/100?img=" + Math.floor(Math.random() * 70),
                        createdAt: serverTimestamp()
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                alert(error.message);
            }
        };

        window.logout = () => signOut(auth);

        // Auth State Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'grid';
                loadFeed();
            } else {
                currentUser = null;
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        // Cloudinary Upload Logic
        async function uploadToCloudinary(file) {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            fd.append('resource_type', 'auto');
            
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, { method: 'POST', body: fd });
            if (!res.ok) throw new Error('Cloudinary upload failed');
            return await res.json();
        }

        // Create Post
        window.createPost = async () => {
            const fileInput = document.getElementById('media-input');
            const title = document.getElementById('post-title').value;
            const btn = document.getElementById('upload-btn');

            if(!fileInput.files[0] || !title) return alert("Select a file and enter a title.");

            btn.innerText = "Uploading...";
            btn.disabled = true;

            try {
                // Upload to Cloudinary
                const uploadRes = await uploadToCloudinary(fileInput.files[0]);
                
                // Save to Firebase Realtime DB
                await push(ref(db, 'videos'), {
                    uid: currentUser.uid,
                    title: title,
                    mediaUrl: uploadRes.secure_url,
                    mediaType: uploadRes.resource_type,
                    timestamp: serverTimestamp()
                });

                closeUploadModal();
                alert("Upload successful!");
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                btn.innerText = "Publish";
                btn.disabled = false;
            }
        };

        // Load Feed
        function loadFeed() {
            onValue(ref(db, 'videos'), (snapshot) => {
                const container = document.getElementById('feed-container');
                container.innerHTML = '';
                
                if (!snapshot.exists()) {
                    container.innerHTML = '<p style="color:var(--text-secondary);">No videos yet. Be the first to upload!</p>';
                    return;
                }

                const videos = [];
                snapshot.forEach(child => videos.push({ id: child.key, ...child.val() }));
                videos.reverse(); // Newest first

                videos.forEach(vid => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    
                    // Simple placeholder logic if it's a video vs image
                    const mediaElement = vid.mediaType === 'video' 
                        ? `<video src="${vid.mediaUrl}" class="video-thumb" muted onmouseover="this.play()" onmouseout="this.pause()"></video>`
                        : `<img src="${vid.mediaUrl}" class="video-thumb">`;

                    card.innerHTML = `
                        ${mediaElement}
                        <div class="video-info-row">
                            <img src="https://i.pravatar.cc/100?u=${vid.uid}" class="avatar">
                            <div class="video-text">
                                <h3>${vid.title}</h3>
                                <p>User • Just now</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // PWA Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Reg Failed', err));
            });
        }

        feather.replace();
    </script>
</body>
</html>
